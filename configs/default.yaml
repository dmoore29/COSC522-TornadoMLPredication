raw_data_paths:
  - data/raw/gsod_2021_2025_mainland_us.csv
start_date: null
end_date: null
target_column: TORNADO_LABEL
candidate_features:
  - TEMP
  - DEWP
  - SLP
  - STP
  - VISIB
  - WDSP
  - MXSPD
  - GUST
  - MAX
  - MIN
  - PRCP
  - ELEVATION
  - LATITUDE
  - LONGITUDE
forbidden_features:
  - FRSHTT
  - STATION
  - DATE
  - NAME
  - source_file
placeholder_values:
  - 9999.9
  - 999.9
  - 99.99
  - -999.9
missingness_threshold: 0.95
output_dir: outputs
save_processed_data: false
processed_data_path: data/processed/modeling_dataset.csv
train_ratio: 0.70
val_ratio: 0.15
test_ratio: 0.15
random_seed: 522
mainland_us_bounds:
  min_latitude: 24.0
  max_latitude: 49.5
  min_longitude: -125.0
  max_longitude: -66.5
logistic_regression_params:
  max_iter: 1000
  class_weight: balanced
  solver: lbfgs
random_forest_params:
  n_estimators: 300
  class_weight: balanced
  random_state: 522
  n_jobs: -1
